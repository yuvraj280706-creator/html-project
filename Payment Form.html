<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
</head>
<body>
    <form action=""></form>
    <h1>Payment Form</h1>
    <p>Required Fields are followed by*</p>
    <h2>Contact Information</h2>
    <p>Name: *<input type="text" name="name"required></p>
    <fieldset>
    <legend>Gender</legend>
    Male <input type="radio"name="gender" id="male"required >
    Female <input type="radio"name="gender" id="female"required></p>
    </fieldset>
    <p>Address: <textarea name="address" id="address" cols="30"rows="10"></textarea></p>
    <p>Email: *<input type="Email" name="Email" id="Email"required></p>
    <p>Pincode: *<input type="number" name="Pincode" id="Pincode"required></p>
    <h2>Payment Information</h2>
    <p>Card Type:*
        <select name="card_type" id="card_type"required>
        <option value="">--Select a Card Type--</option>
        <option value="visa">visa</option>
        <option value="mastercard">mastercard</option>
        <option value="rupay">rupay</option></p>
        </select>
       <p>Card Number*<input type="number" name="card_number" id="card_number"required></p>
        <p>Expiration Date:* <input type="date" name="exp_date" id="exp_date"required></p>
        <p>CVV* <input type="password" name="CVV" id="CVV"required></p>
        <p><input type="submit" value="Pay Now"></p>
    
</body>
</html>
